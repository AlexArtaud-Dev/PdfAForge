name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore PdfAForge.sln

      - name: Build (Release)
        run: msbuild PdfAForge.sln /p:Configuration=Release /p:Platform="Any CPU" /m /nologo /v:minimal

      - name: Run tests
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vstest  = & $vswhere -latest -products * -find **\vstest.console.exe |
                     Select-Object -First 1
          & $vstest PdfAForge.Tests\bin\Release\PdfAForge.Tests.dll /logger:trx

  release:
    name: Release
    runs-on: windows-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore PdfAForge.sln

      - name: Prepare publish inputs
        shell: pwsh
        run: |
          $workspace = "${{ github.workspace }}"
          $projectDir = Join-Path $workspace "PdfAForge"
          $projectFile = Join-Path $projectDir "PdfAForge.csproj"
          $workspaceFullPath = [System.IO.Path]::GetFullPath($workspace)
          $projectDirFullPath = [System.IO.Path]::GetFullPath($projectDir)
          $directorySeparator = [System.IO.Path]::DirectorySeparatorChar

          function Test-IsPathWithinRoot {
            param(
              [string]$Path,
              [string]$Root
            )

            return $Path.StartsWith($Root + $directorySeparator, [StringComparison]::OrdinalIgnoreCase) -or
                   $Path.Equals($Root, [StringComparison]::OrdinalIgnoreCase)
          }

          [xml]$csproj = Get-Content -Path $projectFile
          $missingContentItems = @()
          $contentItems = @($csproj.Project.ItemGroup | ForEach-Object { @($_.Content) })

          foreach ($item in $contentItems) {
            $include = $item.Include
            if ([string]::IsNullOrWhiteSpace($include)) {
              continue
            }

            if ([System.IO.Path]::IsPathRooted($include)) {
              continue
            }

            $normalizedInclude = $include -replace '[/\\]', [System.IO.Path]::DirectorySeparatorChar
            $projectPath = [System.IO.Path]::GetFullPath((Join-Path $projectDir $normalizedInclude))
            if (-not (Test-IsPathWithinRoot -Path $projectPath -Root $projectDirFullPath)) {
              throw "Invalid content include path outside project directory: $include"
            }

            if (Test-Path -LiteralPath $projectPath) {
              continue
            }

            $rootPath = [System.IO.Path]::GetFullPath((Join-Path $workspace $normalizedInclude))
            if (-not (Test-IsPathWithinRoot -Path $rootPath -Root $workspaceFullPath)) {
              throw "Invalid content include path outside workspace: $include"
            }

            if (Test-Path -LiteralPath $rootPath) {
              $projectItemDir = Split-Path -Parent $projectPath
              if (-not [string]::IsNullOrWhiteSpace($projectItemDir) -and -not (Test-Path -LiteralPath $projectItemDir)) {
                New-Item -ItemType Directory -Path $projectItemDir -Force | Out-Null
              }

              Copy-Item -Path $rootPath -Destination $projectPath
            } else {
              $missingContentItems += $include
            }
          }

          if ($missingContentItems.Count -gt 0) {
            $missingList = $missingContentItems -join ", "
            throw "Missing required publish content files referenced by PdfAForge.csproj: $missingList"
          }

      - name: Publish to file system
        shell: pwsh
        run: |
          $out = "${{ github.workspace }}\publish"
          msbuild PdfAForge\PdfAForge.csproj /p:Configuration=Release /p:Platform=AnyCPU `
            /p:WebPublishMethod=FileSystem /p:PublishUrl="$out" `
            /p:DeployOnBuild=true /p:DeleteExistingFiles=true `
            /nologo /v:minimal

      - name: Read version from Web.config
        id: version
        shell: pwsh
        run: |
          $v = ([xml](Get-Content PdfAForge\Web.config)).configuration.appSettings.add |
               Where-Object { $_.key -eq 'ServiceVersion' } |
               Select-Object -ExpandProperty value
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* `
            -DestinationPath PdfAForge-v${{ steps.version.outputs.value }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}-${{ github.run_number }}
          name: PdfAForge v${{ steps.version.outputs.value }} (build ${{ github.run_number }})
          body: |
            IIS deployment package for Windows Server (.NET Framework 4.8).

            **Install**
            1. Extract the ZIP into your IIS site root (e.g. `C:\inetpub\wwwroot\PdfAForge`)
            2. Edit `Web.config`: set `LogPath` and verify `IccProfilePath`
            3. Ensure the App Pool targets **.NET CLR v4.0**, integrated pipeline
          files: PdfAForge-v${{ steps.version.outputs.value }}.zip
