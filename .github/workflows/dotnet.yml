name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore PdfAForge.sln

      - name: Build (Release)
        run: msbuild PdfAForge.sln /p:Configuration=Release /p:Platform="Any CPU" /m /nologo /v:minimal

      - name: Run tests
        run: vstest.console.exe PdfAForge.Tests\bin\Release\PdfAForge.Tests.dll /logger:trx